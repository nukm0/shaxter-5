<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miner Empire | Telegram Mini App + Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #170a2e, #3b1c68, #7e42c9); padding: 16px; color: #f5ecff; min-height: 100vh; }
        .game-container { max-width: 1400px; margin: 0 auto; }
        .currency-panel { display: flex; flex-wrap: wrap; gap: 10px; background: rgba(25,8,48,0.8); backdrop-filter: blur(12px); border-radius: 60px; padding: 12px 20px; margin-bottom: 20px; border: 1px solid #d6a4ff; }
        .currency-card { background: linear-gradient(145deg,#3a2668,#26184a); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; gap: 8px; flex: 1; min-width: 90px; justify-content: center; }
        .currency-emoji { font-size: 26px; filter: drop-shadow(0 2px 3px gold); }
        .currency-value { font-size: 22px; font-weight: bold; }
        .currency-label { font-size: 9px; opacity: 0.85; }
        .nav-menu { display: flex; flex-wrap: wrap; gap: 8px; background: #2c1250b3; border-radius: 60px; padding: 8px 16px; margin-bottom: 24px; justify-content: center; }
        .nav-btn { background: linear-gradient(145deg,#3f2a68,#2a184a); border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; font-size: 13px; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .nav-btn:hover { transform: translateY(-2px); background: linear-gradient(145deg,#5a3a8a,#3f2a68); }
        .nav-btn.active { background: linear-gradient(95deg,#cc9aff,#a561ff); box-shadow: 0 0 10px #c58aff; color: #1d052f; }
        .section { background: rgba(10,3,27,0.65); backdrop-filter: blur(12px); border-radius: 40px; padding: 20px; border: 1px solid #bc87fc; margin-bottom: 24px; }
        .hidden { display: none; }
        .section-title { font-size: 24px; margin-bottom: 18px; border-left: 5px solid #ecbfff; padding-left: 16px; }
        .guest-warning { background: #ff9800; color: #2c1a3a; border-radius: 40px; padding: 12px 16px; margin-bottom: 16px; font-weight: bold; text-align: center; }
        .miners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 18px; }
        .miner-card { background: linear-gradient(120deg,#321e5c,#1f0f42); border-radius: 28px; padding: 15px; border: 1px solid #bd8aff; }
        .buy-group { display: flex; gap: 10px; margin-top: 12px; }
        .buy-btn { background: linear-gradient(145deg,#ffb347,#ff9f1a); border: none; padding: 8px 0; border-radius: 40px; font-weight: bold; cursor: pointer; flex: 1; transition: 0.2s; color: #2c1a3a; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .buy-btn:hover { transform: translateY(-2px); background: linear-gradient(145deg,#ffc46b,#ffae2e); }
        .exchange-panel { background: #1e0d3cd9; border-radius: 40px; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .exchange-block { background: #311d58; border-radius: 32px; padding: 16px; flex: 1; min-width: 230px; }
        .exchange-input { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .exchange-input input { background: #1e0b3a; border: none; padding: 10px 14px; border-radius: 50px; color: white; font-size: 16px; width: 130px; text-align: center; }
        .max-btn, .exchange-action, .action-button { background: linear-gradient(145deg,#e4a022,#c4841a); border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; color: #2c1a3a; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .exchange-action { width: 100%; padding: 10px; margin-top: 5px; }
        .shop-tabs { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .shop-tab { background: linear-gradient(145deg,#382268,#281a4a); padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .shop-tab.active { background: linear-gradient(145deg,#be83ff,#9a5bdf); color: #1d0736; box-shadow: 0 0 8px #d6aaff; }
        .shop-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 16px; }
        .shop-item { background: #231342; border-radius: 26px; padding: 14px; text-align: center; }
        .shop-buy, .desc-btn { background: linear-gradient(145deg,#ffa559,#ff8c2e); border: none; padding: 8px 12px; border-radius: 40px; margin-top: 8px; font-weight: bold; cursor: pointer; display: inline-block; margin: 5px; color: #2c1a3a; }
        .desc-btn { background: linear-gradient(145deg,#6a4abe,#503596); color: white; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2a1a55; border-radius: 32px; padding: 24px; max-width: 400px; width: 90%; color: white; border: 2px solid #c58aff; }
        .close-modal { margin-top: 15px; background: #e4a022; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .daily-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px,1fr)); gap: 6px; margin-top: 12px; }
        .daily-day { background: #2d1a55; border-radius: 20px; padding: 6px; text-align: center; font-size: 11px; cursor: pointer; }
        .daily-day.claimed { background: #4a3670; opacity: 0.7; cursor: default; position: relative; }
        .daily-day.claimed::after { content: "✅"; position: absolute; top: 2px; right: 5px; font-size: 10px; }
        .daily-day.today { background: #b87cff; color: #1d052f; font-weight: bold; box-shadow: 0 0 6px #d6aaff; }
        .vip-card { background: linear-gradient(135deg, #c9a03d, #b8860b); border-radius: 32px; padding: 18px; margin-top: 20px; color: #1f0a2e; font-weight: bold; }
        .admin-card { background: linear-gradient(145deg,#231552,#1a0e3a); border-radius: 36px; padding: 20px; margin-bottom: 20px; }
        .admin-field-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 60px; }
        .admin-field-row input, .admin-field-row select { background: #2e1a4b; border: none; padding: 10px 16px; border-radius: 40px; color: white; flex: 1; }
        .admin-field-row button { background: linear-gradient(145deg,#6a4abe,#503596); border: none; padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2f195fe6; backdrop-filter: blur(12px); padding: 8px 20px; border-radius: 50px; z-index: 9999; border-left: 5px solid #ffc107; font-weight: bold; font-size: 14px; }
        .storage-bar { background: #2e1a4b; border-radius: 20px; height: 20px; margin: 10px 0; overflow: hidden; }
        .storage-fill { background: #ffb347; height: 100%; width: 0%; transition: width 0.3s; }
        .top-list { background: #1f0f3a; border-radius: 28px; padding: 12px; margin-bottom: 12px; }
        .top-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #7e57b0; }
        .crown { color: gold; font-weight: bold; margin-left: 5px; }
        .ref-link-field { display: flex; gap: 10px; background: #311d58; border-radius: 60px; padding: 10px 15px; margin-top: 15px; align-items: center; flex-wrap: wrap; }
        .ref-link-field input { background: #1e0b3a; border: none; padding: 10px 16px; border-radius: 50px; color: white; flex: 1; }
        .action-buttons { display: flex; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
        @media (max-width: 600px) { .currency-value { font-size: 16px; } .nav-btn { padding: 6px 12px; font-size: 11px; } .admin-field-row { flex-direction: column; align-items: stretch; } }
        .quest-line { background: #2a164eb3; border-radius: 24px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .quest-link-btn { background: linear-gradient(145deg,#4c3599,#35226b); color: white; padding: 6px 12px; border-radius: 40px; border: none; cursor: pointer; }
        .quest-category { margin-bottom: 24px; }
        .quest-levels { margin-left: 12px; border-left: 3px solid #bb86fc; padding-left: 14px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js",
                "firebase/analytics": "https://www.gstatic.com/firebasejs/11.6.0/firebase-analytics.js"
            }
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, query, orderBy, limit } from "firebase/firestore";
        import { getAnalytics } from "firebase/analytics";

        // ========== FIREBASE КОНФИГ (ВАШ) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAL1TVVzKtXlStyZxHXe-zeptE-hjeMSPw",
            authDomain: "shaxter5.firebaseapp.com",
            projectId: "shaxter5",
            storageBucket: "shaxter5.firebasestorage.app",
            messagingSenderId: "1043448741453",
            appId: "1:1043448741453:web:cbf2c046704c8daf862604",
            measurementId: "G-7ZZR2NNJ5Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        // ========== Telegram Web App ==========
        const tg = window.Telegram?.WebApp;
        let isGuest = true;
        let userTelegramId = null;

        if (tg) {
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user && user.id) {
                isGuest = false;
                userTelegramId = user.id.toString();
                document.getElementById('guestWarning').style.display = 'none';
            } else {
                document.getElementById('guestWarning').style.display = 'block';
            }
        } else {
            document.getElementById('guestWarning').style.display = 'block';
        }

        // ========== ИГРОВЫЕ ДАННЫЕ ==========
        let minersData = [
            { level:1, name:"⛏️ Шахтёр Lv.1", hourly:100, costGold:1000, prodSec:100/3600 },
            { level:2, name:"⛏️ Шахтёр Lv.2", hourly:700, costGold:5000, prodSec:700/3600 },
            { level:3, name:"⛏️ Шахтёр Lv.3", hourly:3500, costGold:20000, prodSec:3500/3600 },
            { level:4, name:"⛏️ Шахтёр Lv.4", hourly:10500, costGold:50000, prodSec:10500/3600 },
            { level:5, name:"⛏️ Шахтёр Lv.5", hourly:18000, costGold:75000, prodSec:18000/3600 },
            { level:6, name:"⛏️ Шахтёр Lv.6", hourly:28000, costGold:100000, prodSec:28000/3600 },
            { level:7, name:"⛏️ Шахтёр Lv.7", hourly:100000, costGold:300000, prodSec:100000/3600 }
        ];

        let resources = { diamonds: 0, oil: 0, gold: 0, bucks: 0, superBucks: 0 };
        let minersCount = new Array(7).fill(0);
        let totalMined = 0, totalMinersPurchased = 0, totalExchangeDiamonds = 0, totalBucksSpentOnShop = 0;
        let prestigeCount = 0, prestigeMultiplier = 1.0;
        let storageLevel = 0, storageCollectedAt = Date.now(), storedDiamonds = 0;
        let oilIsland = { owned: false, lastCollect: 0 };
        let linkQuests = [], promoCodes = [];
        let currentUser = {
            id: isGuest ? 'guest' : userTelegramId,
            refBy: null,
            refEarnings: 0,
            referrals: [],
            joinTime: Date.now(),
            vip: { active: false, expires: 0, forever: false },
            daily: { streak: 0, lastClaim: 0, claimedDays: [] },
            vipDailyLast: 0
        };
        let blockedUsers = [];

        // ========== РЕФЕРАЛЬНАЯ СИСТЕМА (ОБРАБОТКА ПРИ ПЕРВОМ ЗАПУСКЕ) ==========
        async function processReferral() {
            if (isGuest) return;
            const urlParams = new URLSearchParams(window.location.search);
            const refId = urlParams.get('ref');
            if (!refId || refId === userTelegramId) return;

            // Проверяем, не привязан ли уже реферал
            const userDoc = await getDoc(doc(db, "users", userTelegramId));
            if (userDoc.exists() && userDoc.data().refBy) return; // уже есть реферал

            // Привязываем реферала
            await setDoc(doc(db, "users", userTelegramId), { refBy: refId }, { merge: true });
            currentUser.refBy = refId;

            // Добавляем реферала в список пригласившего
            const inviterRef = doc(db, "users", refId);
            const inviterSnap = await getDoc(inviterRef);
            if (inviterSnap.exists()) {
                const inviterData = inviterSnap.data();
                const referrals = inviterData.referrals || [];
                if (!referrals.includes(userTelegramId)) {
                    referrals.push(userTelegramId);
                    await updateDoc(inviterRef, { referrals });
                }
            } else {
                await setDoc(inviterRef, { referrals: [userTelegramId] }, { merge: true });
            }
            showToast(`🎉 Вы пришли по реферальной ссылке! +5000💰 бонус (уже начислено)`);
        }

        // ========== ЗАГРУЗКА / СОХРАНЕНИЕ В FIRESTORE ==========
        async function loadFromFirestore() {
            if (isGuest) return false;
            try {
                const userDoc = await getDoc(doc(db, "users", userTelegramId));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    resources = data.resources || { diamonds:0, oil:0, gold:0, bucks:0, superBucks:0 };
                    minersCount = data.minersCount || new Array(7).fill(0);
                    totalMined = data.totalMined || 0;
                    totalMinersPurchased = data.totalMinersPurchased || 0;
                    totalExchangeDiamonds = data.totalExchangeDiamonds || 0;
                    totalBucksSpentOnShop = data.totalBucksSpentOnShop || 0;
                    prestigeCount = data.prestigeCount || 0;
                    prestigeMultiplier = data.prestigeMultiplier || 1.0;
                    storageLevel = data.storageLevel || 0;
                    storageCollectedAt = data.storageCollectedAt || Date.now();
                    storedDiamonds = data.storedDiamonds || 0;
                    oilIsland = data.oilIsland || { owned: false, lastCollect: 0 };
                    currentUser = data.currentUser || currentUser;
                    currentUser.id = userTelegramId;
                    if (!currentUser.joinTime) currentUser.joinTime = Date.now();
                    if (!currentUser.daily) currentUser.daily = { streak:0, lastClaim:0, claimedDays:[] };
                    if (!currentUser.vip) currentUser.vip = { active:false, expires:0, forever:false };
                    if (currentUser.vip.forever) currentUser.vip.active = true;
                    else if (currentUser.vip.expires && currentUser.vip.expires < Date.now()) currentUser.vip.active = false;
                    else if (currentUser.vip.expires > Date.now()) currentUser.vip.active = true;
                    else currentUser.vip.active = false;
                    return true;
                }
            } catch(e) { console.warn(e); }
            return false;
        }

        async function saveToFirestore() {
            if (isGuest) return;
            try {
                await setDoc(doc(db, "users", userTelegramId), {
                    resources, minersCount, totalMined, totalMinersPurchased,
                    totalExchangeDiamonds, totalBucksSpentOnShop,
                    prestigeCount, prestigeMultiplier,
                    storageLevel, storageCollectedAt, storedDiamonds,
                    oilIsland, currentUser,
                    lastUpdated: Date.now()
                }, { merge: true });
            } catch(e) { console.warn(e); }
        }

        function saveToSession() {
            if (!isGuest) return;
            const data = { resources, minersCount, totalMined, totalMinersPurchased,
                totalExchangeDiamonds, totalBucksSpentOnShop, prestigeCount, prestigeMultiplier,
                storageLevel, storageCollectedAt, storedDiamonds, oilIsland, currentUser,
                linkQuests, promoCodes };
            sessionStorage.setItem('miner_guest', JSON.stringify(data));
        }

        function loadFromSession() {
            if (!isGuest) return false;
            const raw = sessionStorage.getItem('miner_guest');
            if (raw) {
                try {
                    const d = JSON.parse(raw);
                    resources = d.resources; minersCount = d.minersCount; totalMined = d.totalMined;
                    totalMinersPurchased = d.totalMinersPurchased; totalExchangeDiamonds = d.totalExchangeDiamonds;
                    totalBucksSpentOnShop = d.totalBucksSpentOnShop; prestigeCount = d.prestigeCount || 0;
                    prestigeMultiplier = d.prestigeMultiplier || 1.0; storageLevel = d.storageLevel || 0;
                    storageCollectedAt = d.storageCollectedAt || Date.now(); storedDiamonds = d.storedDiamonds || 0;
                    oilIsland = d.oilIsland || { owned: false, lastCollect: 0 };
                    currentUser = d.currentUser; linkQuests = d.linkQuests || []; promoCodes = d.promoCodes || [];
                    if (!currentUser) currentUser = { id:'guest', joinTime:Date.now(), daily:{ streak:0, lastClaim:0, claimedDays:[] }, vip:{ active:false, expires:0, forever:false } };
                    if (!currentUser.daily) currentUser.daily = { streak:0, lastClaim:0, claimedDays:[] };
                    if (!currentUser.vip) currentUser.vip = { active:false, expires:0, forever:false };
                    return true;
                } catch(e) {}
            }
            return false;
        }

        async function saveGame() {
            if (!isGuest) await saveToFirestore();
            else saveToSession();
        }

        async function loadGame() {
            let loaded = false;
            if (!isGuest) {
                loaded = await loadFromFirestore();
                await processReferral(); // обрабатываем реферала при первом запуске
                if (!loaded) {
                    // Стартовый бонус
                    let startBonus = currentUser.refBy ? 15000 : 10000;
                    resources.gold = startBonus;
                    showToast(`+${startBonus} стартового золота`);
                }
            } else {
                loaded = loadFromSession();
                if (!loaded) resources.gold = 10000;
            }
            if (!currentUser.daily) currentUser.daily = { streak:0, lastClaim:0, claimedDays:[] };
            if (!currentUser.vip) currentUser.vip = { active:false, expires:0, forever:false };
            if (currentUser.vip.forever) currentUser.vip.active = true;
            else if (currentUser.vip.expires && currentUser.vip.expires < Date.now()) currentUser.vip.active = false;
            else if (currentUser.vip.expires > Date.now()) currentUser.vip.active = true;
            else currentUser.vip.active = false;
            if (!currentUser.joinTime) currentUser.joinTime = Date.now();
            // Сброс ежедневного стрика при пропуске
            let now = new Date().toDateString();
            let lastClaim = currentUser.daily.lastClaim ? new Date(currentUser.daily.lastClaim).toDateString() : null;
            if (lastClaim && lastClaim !== now) {
                let yesterday = new Date(Date.now()-86400000).toDateString();
                if (lastClaim !== yesterday) { currentUser.daily.streak = 0; currentUser.daily.claimedDays = []; }
            }
            updateUI();
            checkPendingLinkQuest();
        }

        // ========== ОСТАЛЬНЫЕ ИГРОВЫЕ ФУНКЦИИ (сокращены для краткости, но рабочие) ==========
        function isVipActive() { return currentUser.vip.active; }
        function getTotalMultiplier() { return prestigeMultiplier * (isVipActive() ? 2 : 1); }
        function totalProductionRaw() { let s=0; for(let i=0;i<7;i++) s+= minersCount[i]*minersData[i].prodSec; return s; }
        function totalProduction() { return totalProductionRaw() * getTotalMultiplier(); }
        function getBaseStorageHours() { return [3,6,9,12][storageLevel] || 3; }
        function getStorageHours() { let base=getBaseStorageHours(); return isVipActive() && storageLevel<3 ? base*2 : (storageLevel===3?Infinity:base); }
        function canCollectStorage() { return storedDiamonds>0 && (getStorageHours()===Infinity || (Date.now()-storageCollectedAt)/3600000>=getStorageHours()); }
        function getStorageFillPercent() { let h=getStorageHours(); if(h===Infinity) return 100; let e=Math.min(h,(Date.now()-storageCollectedAt)/3600000); return (e/h)*100; }
        function addToStorage(amt) { if(!canCollectStorage()) storedDiamonds+=amt; else storedDiamonds=amt; storageCollectedAt=Date.now(); }
        function collectStorage() { let tc=storedDiamonds; resources.diamonds+=tc; totalMined+=tc; storedDiamonds=0; storageCollectedAt=Date.now(); saveGame(); updateUI(); showToast(`Собрано ${Math.floor(tc)}💎`); }
        function getPrestigeCost() { let bs=1000, bb=50; for(let i=0;i<prestigeCount;i++){ bs=Math.floor(bs*1.35); bb=Math.floor(bb*1.35); } return { super:bs, bucks:bb }; }
        function performPrestige() { let c=getPrestigeCost(); if(resources.superBucks>=c.super && resources.bucks>=c.bucks){ resources.superBucks-=c.super; resources.bucks-=c.bucks; resources.diamonds=0; resources.gold=0; minersCount.fill(0); totalMined=0; totalMinersPurchased=0; totalExchangeDiamonds=0; totalBucksSpentOnShop=0; storageLevel=0; storageCollectedAt=Date.now(); storedDiamonds=0; prestigeCount++; prestigeMultiplier=1+prestigeCount*0.2; saveGame(); updateUI(); showToast(`🌟 Престиж! Множитель ${prestigeMultiplier.toFixed(1)}x`); } else showToast(`Не хватает: ${c.super}💸 и ${c.bucks}💵`); }
        function buyStorageUpgrade() { if(storageLevel>=3) return showToast("Максимум"); let cost={ super:[0,1500,2500,6000][storageLevel+1], gold:[0,30000,100000,500000][storageLevel+1] }; if(resources.superBucks>=cost.super && resources.gold>=cost.gold){ resources.superBucks-=cost.super; resources.gold-=cost.gold; storageLevel++; saveGame(); updateUI(); showToast(`Склад улучшен до ${storageLevel+1} уровня`); } else showToast(`Нужно ${cost.super}💸 и ${cost.gold}💰`); }
        function buyOilIsland() { if(oilIsland.owned) return showToast("Уже куплен"); if(resources.oil>=200){ resources.oil-=200; oilIsland.owned=true; oilIsland.lastCollect=0; saveGame(); updateUI(); showToast("🏝️ Нефтяной остров куплен!"); } else showToast("Нужно 200 нефти"); }
        function collectOilIsland() { if(!oilIsland.owned) return showToast("Купите остров"); if((Date.now()-(oilIsland.lastCollect||0))<12*3600000) return showToast("Ещё не готов (12ч)"); let hourly=totalProductionRaw()*3600; let isDiam=Math.random()<0.7; if(isDiam){ let amt=Math.floor(hourly*(0.5+Math.random()*1)); resources.diamonds+=amt; showToast(`🏝️ Остров: +${amt}💎`); } else{ resources.oil+=1; showToast(`🏝️ Остров: +1🛢️`); } oilIsland.lastCollect=Date.now(); saveGame(); updateUI(); }
        function buyMiner(lvl,qty=1) { let cost=minersData[lvl].costGold*qty; if(resources.gold>=cost){ resources.gold-=cost; minersCount[lvl]+=qty; totalMinersPurchased+=qty; updateQuestsByType('miners_bought',qty); saveGame(); updateUI(); showToast(`+${qty} ${minersData[lvl].name}`); } else showToast("Не хватает золота"); }

        // Топ
        async function getTopUsers() {
            if(isGuest) return [];
            try {
                const q = query(collection(db, "users"), orderBy("totalMined", "desc"), limit(10));
                const snap = await getDocs(q);
                const users = [];
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const prod = (data.minersCount?.reduce((s,c,i)=>s+c*minersData[i].prodSec,0)||0) * (data.currentUser?.vip?.active?2:1) * (data.prestigeMultiplier||1);
                    users.push({ id: docSnap.id, production: prod, referrals: data.currentUser?.referrals?.length||0, playtime: data.currentUser?.joinTime?Math.floor((Date.now()-data.currentUser.joinTime)/1000):0, isVip: data.currentUser?.vip?.active||false });
                });
                return users;
            } catch(e){ return []; }
        }

        function updateQuestsByType(type,val){ let all=[...Object.values(questTemplates),...premiumQuests]; for(let q of all){ if(q.type===type && q.currentLevel<10){ let prog=(type==='diamonds_mined')?totalMined:(type==='miners_bought')?totalMinersPurchased:(type==='exchange_diamonds')?totalExchangeDiamonds:(type==='bucks_spent')?totalBucksSpentOnShop:0; let need=Math.floor(q.baseReq*Math.pow(q.multiplier,q.currentLevel)); if(prog>=need && !(q.claimedLevels||[]).includes(q.currentLevel)){ let rewardGold=q.rewardGoldBase*(q.currentLevel+1); resources.gold+=rewardGold; if(!q.claimedLevels) q.claimedLevels=[]; q.claimedLevels.push(q.currentLevel); showToast(`🏆 ${q.name} ур.${q.currentLevel+1} +${rewardGold}💰`); if(q.currentLevel+1===10){ resources.bucks+=1; showToast(`⭐ Пройдено! +1 бакс`); } q.currentLevel++; saveGame(); updateUI(); } } } renderQuests(); }

        function claimDaily(day){ if(day!==currentUser.daily.streak) return showToast("Можно только следующий день!"); if(currentUser.daily.claimedDays.includes(day)) return showToast("Уже забрано"); let now=new Date().toDateString(); if(currentUser.daily.lastClaim && new Date(currentUser.daily.lastClaim).toDateString()===now) return showToast("Сегодня уже брали"); let r=dailyRewards[day]; if(r.type==="gold"){ resources.gold+=r.amount; showToast(`+${r.amount}💰`); } else{ let lvl=Math.floor(Math.random()*7)+1; minersCount[lvl-1]++; totalMinersPurchased++; showToast(`🎁 + Шахтёр Lv.${lvl}`); } currentUser.daily.claimedDays.push(day); currentUser.daily.streak++; currentUser.daily.lastClaim=Date.now(); if(currentUser.daily.streak>=30){ currentUser.daily.streak=0; currentUser.daily.claimedDays=[]; showToast("🎉 Цикл завершён!"); } saveGame(); updateUI(); renderDaily(); }
        function claimVipDaily(){ if(!isVipActive()) return showToast("VIP неактивен"); if(Date.now()-(currentUser.vipDailyLast||0)<86400000) return showToast("Раз в 24ч"); let hourly=totalProductionRaw()*3600; let r=Math.floor(Math.random()*3); if(r===0){ let amt=Math.max(5000,Math.floor(hourly*(0.5+Math.random()*1))); resources.gold+=amt; showToast(`💰 VIP клад: +${amt} золота`); } else if(r===1){ let amt=Math.max(10000,Math.floor(hourly*(0.5+Math.random()*1))); resources.diamonds+=amt; showToast(`💎 VIP клад: +${Math.floor(amt)} алмазов`); } else{ resources.oil+=1; showToast(`🛢️ VIP клад: +1 нефть`); } currentUser.vipDailyLast=Date.now(); saveGame(); updateUI(); }
        function renderDaily(){ let html=`<div class="daily-rewards"><h3>📅 Ежедневный стрик (день ${currentUser.daily.streak+1}/30)</h3><div class="daily-grid">`; for(let i=0;i<30;i++){ let claimed=currentUser.daily.claimedDays.includes(i); let todayActive=(i===currentUser.daily.streak && new Date().toDateString() !== (currentUser.daily.lastClaim?new Date(currentUser.daily.lastClaim).toDateString():'')); html+=`<div class="daily-day ${claimed?'claimed':''} ${todayActive?'today':''}" data-day="${i}">День ${i+1}<br>${dailyRewards[i].type==='miner'?'🎁 Шахтёр':'💰 '+dailyRewards[i].amount}</div>`; } html+=`</div>${currentUser.daily.streak<30 && !currentUser.daily.claimedDays.includes(currentUser.daily.streak) && new Date().toDateString() !== (currentUser.daily.lastClaim?new Date(currentUser.daily.lastClaim).toDateString():'') ? `<button id="claimDailyBtn" class="action-button" style="margin-top:12px;">Забрать</button>` : ''}</div>`; document.getElementById('dailyContainer').innerHTML=html; document.querySelectorAll('.daily-day').forEach(div=>{ if(div.classList.contains('today') && !div.classList.contains('claimed')) div.addEventListener('click',()=>claimDaily(parseInt(div.dataset.day))); }); if(document.getElementById('claimDailyBtn')) document.getElementById('claimDailyBtn').onclick=()=>claimDaily(currentUser.daily.streak); document.getElementById('claimVipDailyBtn').onclick=claimVipDaily; }
        function renderIslands(){ let cont=document.getElementById('islandsContainer'); if(!cont) return; let sh=getStorageHours(); cont.innerHTML=`<div class="admin-card"><h3>🏝️ Нефтяной остров</h3><p>Стоимость: 200 🛢️</p>${!oilIsland.owned?'<button id="buyOilIslandBtn" class="action-button">Купить</button>':'<button id="collectOilIslandBtn" class="action-button">Собрать доход</button>'}</div><div class="admin-card"><h3>🏗️ Остров склад</h3><p>Уровень: ${storageLevel+1}/4, время: ${sh===Infinity?'∞':sh+'ч'}</p>${storageLevel<3?'<button id="upgradeStorageBtn" class="action-button">Улучшить</button>':'<span>MAX</span>'}</div>`; document.getElementById('buyOilIslandBtn')?.addEventListener('click',buyOilIsland); document.getElementById('collectOilIslandBtn')?.addEventListener('click',collectOilIsland); document.getElementById('upgradeStorageBtn')?.addEventListener('click',buyStorageUpgrade); }
        async function renderTop(tab){ if(isGuest){ document.getElementById('topContent').innerHTML='<div class="top-list">Топ доступен только Telegram-пользователям</div>'; return; } let users=await getTopUsers(); if(tab==="production") users.sort((a,b)=>b.production-a.production); else if(tab==="referrals") users.sort((a,b)=>b.referrals-a.referrals); else users.sort((a,b)=>b.playtime-a.playtime); let html=users.slice(0,10).map((u,i)=>`<div class="top-item"><span>${i+1}. ${u.id} ${u.isVip?'👑':''}</span><span>${tab==='production'?u.production.toFixed(2)+'💎/сек':tab==='referrals'?u.referrals+' реф':Math.floor(u.playtime/3600)+'ч '+(Math.floor(u.playtime/60)%60)+'м'}</span></div>`).join(''); document.getElementById('topContent').innerHTML=`<div class="top-list">${html||"Нет данных"}</div>`; }
        function renderProfile(){ document.getElementById('profileStats').innerHTML=`<div>🆔 ${isGuest?'Гость':userTelegramId}</div><div>⛏️ Шахтёров: ${minersCount.reduce((a,b)=>a+b,0)}</div><div>💎 Добыто: ${Math.floor(totalMined)}</div><div>👑 VIP: ${isVipActive()?'Активен':'Неактивен'}</div><div>🌟 Множитель: ${getTotalMultiplier().toFixed(2)}x</div>`; document.getElementById('refStat').innerHTML=`Приглашено: ${currentUser.referrals.length} | Бонус: ${currentUser.refEarnings.toFixed(2)} (${getRefBonusPercent()}%)`; }
        function renderPrestige(){ let c=getPrestigeCost(); document.getElementById('prestigeCostSuper').innerText=c.super; document.getElementById('prestigeCostBucks').innerText=c.bucks; document.getElementById('prestigeStats').innerHTML=`<div>🌟 Престижей: ${prestigeCount}</div><div>📈 Множитель: +${(prestigeCount*0.2).toFixed(1)}x</div><div>💰 Следующий: ${c.super}💸 + ${c.bucks}💵</div>`; }
        function showModal(title,text){ let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>${title}</h3><div style="white-space:pre-line">${text}</div><button class="close-modal">Закрыть</button></div>`; document.body.appendChild(m); m.querySelector('.close-modal').onclick=()=>m.remove(); }
        function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
        function deleteProgress(){ if(confirm("Удалить прогресс? Необратимо!")){ resources={diamonds:0,oil:0,gold:0,bucks:0,superBucks:0}; minersCount.fill(0); totalMined=0; totalMinersPurchased=0; totalExchangeDiamonds=0; totalBucksSpentOnShop=0; storageLevel=0; storageCollectedAt=Date.now(); storedDiamonds=0; prestigeCount=0; prestigeMultiplier=1.0; currentUser.daily.streak=0; currentUser.daily.claimedDays=[]; saveGame(); updateUI(); showToast("Прогресс удалён"); } }

        // Обработчики событий
        function bindEvents() {
            document.getElementById('maxDiamonds').onclick=()=>document.getElementById('diamondAmount').value=Math.floor(resources.diamonds);
            document.getElementById('maxGoldToSuper').onclick=()=>document.getElementById('goldToSuperAmount').value=Math.floor(resources.gold);
            document.getElementById('maxSuperToGold').onclick=()=>document.getElementById('superToGoldAmount').value=Math.floor(resources.superBucks);
            document.getElementById('maxOilToBucks').onclick=()=>document.getElementById('oilToBucksAmount').value=Math.floor(resources.oil);
            document.getElementById('exchangeDiamondToGold').onclick=()=>exchangeDiamondToGold(parseInt(document.getElementById('diamondAmount').value)||0);
            document.getElementById('exchangeGoldToSuper').onclick=()=>exchangeGoldToSuper(parseInt(document.getElementById('goldToSuperAmount').value)||0);
            document.getElementById('exchangeSuperToGold').onclick=()=>exchangeSuperToGold(parseInt(document.getElementById('superToGoldAmount').value)||0);
            document.getElementById('exchangeOilToBucks').onclick=()=>exchangeOilToBucks(parseInt(document.getElementById('oilToBucksAmount').value)||0);
            document.getElementById('exchangeBucksToOil').onclick=()=>exchangeBucksToOil(parseInt(document.getElementById('oilToBucksAmount').value)||0);
            document.getElementById('copyRefBtn').onclick=()=>{ if(!isGuest){ navigator.clipboard.writeText(generateRefLink()); showToast("Ссылка скопирована"); } else showToast("Доступно только в Telegram"); };
            document.getElementById('activatePromoProfileBtn').onclick=()=>activatePromo(document.getElementById('promoInputProfile').value);
            document.getElementById('depositBtn').onclick=()=>{ if(!isGuest) window.open(`https://t.me/minermine1_bot?text=💰 ПОПОЛНЕНИЕ%0AID: ${userTelegramId}`,'_blank'); else showToast("Доступно только в Telegram"); };
            document.getElementById('withdrawBtn').onclick=()=>{ if(!isGuest && resources.bucks>=50) window.open(`https://t.me/minermine1_bot?text=💸 ВЫВОД%0AID: ${userTelegramId}%0AСумма: ${Math.floor(resources.bucks)} баксов`,'_blank'); else showToast(isGuest?"Только в Telegram":"Вывод от 50 баксов"); };
            document.getElementById('deleteProgressBtn').onclick=deleteProgress;
            document.getElementById('prestigeBtn').onclick=performPrestige;
            document.getElementById('adminLoginBtn').onclick=()=>{ if(document.getElementById('adminPassInput').value === 'Kirill009q') document.getElementById('adminTools').style.display='block'; else showToast("Неверный пароль"); };
            document.getElementById('blockUserBtn').onclick=()=>{ let uid=document.getElementById('targetUserId').value; if(uid && !blockedUsers.includes(uid)) blockedUsers.push(uid); saveGame(); showToast(`Заблокирован ${uid}`); };
            document.getElementById('unblockUserBtn').onclick=()=>{ let uid=document.getElementById('targetUserId').value; blockedUsers=blockedUsers.filter(u=>u!==uid); saveGame(); showToast(`Разблокирован ${uid}`); };
            document.getElementById('giveCustomRewardBtn').onclick=()=>{ let uid=document.getElementById('targetUserId').value; let cur=document.getElementById('rewardCurrencySelect').value; let amt=parseInt(document.getElementById('rewardAmount').value)||0; if(!isGuest && uid===userTelegramId){ if(cur==='gold') resources.gold+=amt; else if(cur==='diamonds') resources.diamonds+=amt; else if(cur==='oil') resources.oil+=amt; else if(cur==='bucks') resources.bucks+=amt; else if(cur==='superBucks') resources.superBucks+=amt; showToast(`Выдано ${amt} ${cur}`); saveGame(); updateUI(); } else showToast("Можно выдавать только себе (или гость)"); };
            document.getElementById('takeCustomRewardBtn').onclick=()=>{ let uid=document.getElementById('targetUserId').value; let cur=document.getElementById('rewardCurrencySelect').value; let amt=parseInt(document.getElementById('rewardAmount').value)||0; if(!isGuest && uid===userTelegramId){ if(cur==='gold') resources.gold=Math.max(0,resources.gold-amt); else if(cur==='diamonds') resources.diamonds=Math.max(0,resources.diamonds-amt); else if(cur==='oil') resources.oil=Math.max(0,resources.oil-amt); else if(cur==='bucks') resources.bucks=Math.max(0,resources.bucks-amt); else if(cur==='superBucks') resources.superBucks=Math.max(0,resources.superBucks-amt); showToast(`Забрано ${amt} ${cur}`); saveGame(); updateUI(); } else showToast("Можно забирать только у себя"); };
            document.getElementById('viewStatsByIdBtn').onclick=()=>{ let uid=document.getElementById('targetUserId').value; if(!isGuest && uid===userTelegramId){ let prod=totalProductionRaw(); document.getElementById('adminStatsResult').innerHTML=`<b>📊 ${uid}</b><br>👥 Рефералов: ${currentUser.referrals.length}<br>⛏️ Шахтёры: ${minersCount.map((c,i)=>`Lv${i+1}:${c}`).join(', ')}<br>💎 Доход в час: ~${(prod*3600).toFixed(0)} | в сек: ${prod.toFixed(4)}<br>⏱️ В игре: ${Math.floor((Date.now()-currentUser.joinTime)/1000)} сек.<br>👑 VIP: ${isVipActive()?'Активен':'Нет'}<br>🌟 Множитель: ${getTotalMultiplier().toFixed(2)}x`; } else showToast("Введите свой ID или гость"); };
            document.getElementById('createPromoBtn').onclick=()=>{ let code=document.getElementById('promoCodeName').value; let type=document.getElementById('promoRewardType').value; let amt=parseInt(document.getElementById('promoRewardAmount').value); if(code&&amt) createPromo(code,type,amt); };
            document.getElementById('createLinkQuestBtn').onclick=()=>{ let desc=document.getElementById('linkQuestDesc').value; let url=document.getElementById('linkQuestUrl').value; let rewardType=document.getElementById('linkQuestRewardType').value; let amount=parseInt(document.getElementById('linkQuestRewardAmount').value); if(desc&&url&&amount) createLinkQuest(desc,url,rewardType,amount); };
            document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden')); document.getElementById(btn.dataset.section+'Section').classList.remove('hidden'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(btn.dataset.section==='top') renderTop(currentTopTab); }));
            document.querySelectorAll('.shop-tab').forEach(tab=>{ tab.addEventListener('click',()=>{ document.querySelectorAll('.shop-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentShopTab=tab.dataset.tab; renderShop(currentShopTab); }); });
            document.querySelectorAll('[data-top]').forEach(tab=>{ tab.addEventListener('click',()=>{ document.querySelectorAll('[data-top]').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentTopTab=tab.dataset.top; renderTop(currentTopTab); }); });
        }

        // Запуск игры
        await loadGame();
        bindEvents();
        setInterval(async () => {
            if(!blockedUsers.includes(isGuest?'guest':userTelegramId)) {
                let prod = totalProduction();
                if(prod>0 && !canCollectStorage()) {
                    resources.diamonds += prod;
                    totalMined += prod;
                    addToStorage(prod);
                    updateQuestsByType('diamonds_mined', prod);
                    await saveGame();
                    updateUI();
                }
            }
        }, 1000);
        setInterval(() => saveGame(), 10000);
        window.deleteLinkQuest = deleteLinkQuest;
        window.deletePromo = deletePromo;
        renderLinkQuests(); renderPromoCodes();
    </script>
</body>
</html>
